services:
  - type: web
      name: auth-website
          env: node
              plan: free
                  buildCommand: npm install
                      startCommand: node server.js
                          healthCheckPath: /api/health
                              envVars:
                                    - key: DATABASE_URL
                                            fromDatabase:
                                                      name: auth-db
                                                                property: connectionString
                                                                      - key: NODE_VERSION
                                                                              value: 18
                                                                                    - key: DISABLE_PUPPETEER
                                                                                            value: "true"

                                                                                            databases:
                                                                                              - name: auth-db
                                                                                                  plan: free
                                                                                                  
